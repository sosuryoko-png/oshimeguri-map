<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Oshimeguri Map</title>
  <link rel="stylesheet" href="style.css">
  <script src="/oshimeguri-map/assets/js/analytics.js"></script>
</head>
<body>
  <main>
    <h1>Oshimeguri Map</h1>
    <p>推しの物語を、現実の地図でたどる。</p>

    <section>
      <h2>作品一覧</h2>
      <div id="work-list"></div>
    </section>
  </main>

  <script>
    fetch("./data/works.json")
      .then(response => response.json())
      .then(works => {
        const container = document.getElementById("work-list");
        container.innerHTML = "";

        works.forEach(work => {
          const article = document.createElement("article");
          article.className = "spot";
          article.innerHTML = `
            <h3>${work.title}</h3>
            <p><strong>カテゴリ:</strong> ${work.category}</p>
            <p><strong>エリア:</strong> ${work.area}</p>
            <p>${work.description}</p>
            <p><a href="${work.page}">作品ページを見る</a></p>
          `;
          container.appendChild(article);
        });
      })
      .catch(error => {
        console.error("works.json の読み込みに失敗:", error);
        document.getElementById("work-list").innerHTML =
          "<p>作品一覧の読み込みに失敗しました。</p>";
      });
  </script>
</body>
</html>
