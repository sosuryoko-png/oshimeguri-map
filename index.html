<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Oshimeguri Map</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Oshimeguri Map</h1>
    <p>推しの物語を、現実の地図でたどる。</p>
  </header>

  <main>
    <section>
      <h2>地図</h2>
      <iframe
        src="https://www.google.com/maps?q=荻窪駅&output=embed"
        width="100%"
        height="320"
        style="border:0;"
        loading="lazy">
      </iframe>
    </section>

    <section>
      <h2>スポット一覧</h2>
      <div id="spot-list"></div>
    </section>
  </main>

  <script>
  fetch("./spots.json")
    .then(response => response.json())
    .then(spots => {
      const container = document.getElementById("spot-list");
      container.innerHTML = "";

      spots.forEach(spot => {
        const article = document.createElement("article");
        article.className = "spot";

        article.innerHTML = `
          <h3>${spot.spotName ?? "名称未設定"}</h3>
          <p><strong>作品:</strong> ${spot.work ?? "不明"}</p>
          <p><strong>エリア:</strong> ${spot.area ?? "不明"}</p>
          <p>${spot.description ?? "説明なし"}</p>
          <p><strong>現在:</strong> ${spot.statusNow ?? "情報なし"}</p>
          <p><strong>改装レベル:</strong> ${spot.changeLevel ?? "不明"}</p>
          <p><a href="${spot.mapUrl ?? '#'}" target="_blank" rel="noopener noreferrer">Google Mapsで見る</a></p>
          <p><a href="${spot.source ?? '#'}" target="_blank" rel="noopener noreferrer">出典を見る</a></p>
        `;

        container.appendChild(article);
      });
    })
    .catch(error => {
      console.error("JSONの読み込みに失敗しました:", error);
    });
  </script>
</body>
</html>
