<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>輪るピングドラム | Oshimeguri Map</title>
  <link rel="stylesheet" href="../../style.css">
  <script src="/oshimeguri-map/assets/js/analytics.js"></script>
</head>
<body>
  <main>
    <h1>輪るピングドラム 聖地マップ</h1>
    <p>荻窪周辺を中心に巡れる作品ページです。</p>
    <p><a href="../../">← 作品一覧へ戻る</a></p>

    <section>
      <h2>作品概要</h2>
      <p>荻窪周辺の商店街・商業施設・公共施設を中心に、徒歩で回りやすい聖地をまとめています。</p>
      <p><strong>巡礼エリア:</strong> 荻窪</p>
      <p><strong>所要時間目安:</strong> 2〜4時間</p>
      <p><strong>おすすめルート:</strong> 荻窪駅 → タウンセブン → 商店街 → 図書館</p>
    </section>

    <section>
      <h2>スポット一覧</h2>
      <div id="spot-list"></div>
    </section>

    <section>
      <h2>注意</h2>
      <p>本ページは非公式のファンメイド情報です。現地訪問時は営業時間・私有地・撮影可否に配慮してください。</p>
    </section>
  </main>

  <script>
    fetch("../../data/penguindrum.json")
      .then(response => response.json())
      .then(spots => {
        const container = document.getElementById("spot-list");
        container.innerHTML = "";

        spots.forEach(spot => {
          const article = document.createElement("article");
          article.className = "spot";

          article.innerHTML = `
            <h3>${spot.spotName ?? "名称未設定"}</h3>
            <p>${spot.description ?? "説明なし"}</p>
            <p><strong>現在:</strong> ${spot.statusNow ?? "情報なし"}</p>
            <p><strong>改装レベル:</strong> ${spot.changeLevel ?? "不明"}</p>
            <p><strong>巡礼ポイント:</strong> ${spot.visitTip ?? "情報なし"}</p>
            <iframe
              src="${spot.embedUrl ?? ''}"
              width="100%"
              height="220"
              style="border:0; border-radius:8px; margin:12px 0;"
              loading="lazy">
            </iframe>
            <p><a href="${spot.mapUrl ?? '#'}" target="_blank" rel="noopener noreferrer">Google Mapsで開く</a></p>
            <p><a href="${spot.source ?? '#'}" target="_blank" rel="noopener noreferrer">出典を見る</a></p>
          `;

          container.appendChild(article);
        });
      })
      .catch(error => {
        console.error("JSONの読み込みに失敗しました:", error);
        document.getElementById("spot-list").innerHTML =
          "<p>スポットデータの読み込みに失敗しました。</p>";
      });
  </script>
</body>
</html>
